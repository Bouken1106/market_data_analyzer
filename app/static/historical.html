<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historical Data</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="header-top">
          <h1 id="symbol-title">Historical Data</h1>
          <details class="page-menu">
            <summary class="page-menu-btn">Pages</summary>
            <nav class="page-menu-list" aria-label="Page navigation">
              <a href="/">US Stock Live Monitor</a>
              <a href="/ml-lab">ML Forecast Lab</a>
              <a href="/strategy-lab">Strategy Lab</a>
              <a href="/compare-lab">Model Compare Lab</a>
              <a href="/historical/AAPL">Historical Chart</a>
            </nav>
          </details>
        </div>
        <p id="symbol-subtitle">Loading...</p>
      </header>

      <section class="card history-toolbar">
        <div class="toolbar-top row">
          <button id="go-back" type="button" class="secondary">Back</button>
        </div>
        <div class="risk-strip">
          <div class="risk-item">
            <span class="label">Current</span>
            <span id="current-price">-</span>
          </div>
          <div class="risk-item">
            <span class="label">30D Volatility</span>
            <span id="risk-vol30">-</span>
          </div>
          <div class="risk-item">
            <span class="label">30D Max Drawdown</span>
            <span id="risk-dd30">-</span>
          </div>
          <div class="risk-item">
            <span class="label">1D VaR (95%)</span>
            <span id="risk-var95">-</span>
          </div>
        </div>
      </section>

      <section class="card chart-card">
        <button id="refresh-history" type="button" class="minor-action chart-refresh-btn">Refresh</button>
        <div class="chart-actions">
          <button id="zoom-in" type="button" class="secondary">Zoom In</button>
          <button id="zoom-out" type="button" class="secondary">Zoom Out</button>
          <button id="reset-zoom" type="button" class="secondary">Reset Zoom (5Y)</button>
          <span class="hint">Wheel: zoom / Drag: pan / Hover: date &amp; price</span>
        </div>
        <div class="chart-shell">
          <canvas id="history-canvas"></canvas>
          <div id="history-tooltip" class="chart-tooltip hidden"></div>
        </div>
        <p id="history-meta" class="hint">Loading historical data...</p>
      </section>
    </main>

    <script src="/static/historical.js" defer></script>
    <script src="/static/page_menu.js" defer></script>
  </body>
</html>
